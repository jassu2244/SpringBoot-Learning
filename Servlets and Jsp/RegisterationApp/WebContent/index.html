<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registeration App</title>
</head>

<body bgcolor="cyan" style="align-content: center;">

    <h1>Welcome to Registeration App</h1>
    <h2>Kindly Register Further to proceed</h2>

    <form method="post" action="./Register">
        <table>
            <tr>
                <td>User Name:</td>
                <td><input type="text" name="uname"></td>
            </tr>

            <tr>
                <td>User Email:</td>
                <td><input type="email" name="email"></td>
            </tr>

            <tr>
                <td>User Password:</td>
                <td><input type="password" name="password"></td>
            </tr>

            <tr>
                <td>User City:</td>
                <td><input type="text" name="ucity"></td>
            </tr>

            <tr>
                <td></td>
                <td><input type="submit" value="Sign Up"></td>
            </tr>
        </table>
    </form>

</body>
</html>
